global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: agentguard-gateway
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: /metrics

  - job_name: agentguard-triage
    static_configs:
      - targets: ['triage:8081']
    metrics_path: /metrics

  - job_name: agentguard-analyst
    static_configs:
      - targets: ['analyst:8083']
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
    metrics_path: /metrics
