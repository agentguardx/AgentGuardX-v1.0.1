global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: agentguard-gateway
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: /metrics

  - job_name: agentguard-triage
    static_configs:
      - targets: ['triage:8081']
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ['redis:6379']

  - job_name: chromadb
    static_configs:
      - targets: ['chromadb:8000']
