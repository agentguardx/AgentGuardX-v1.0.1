apiVersion: 1

# Pin UIDs so the provisioned dashboard's hardcoded datasource refs
# (uid: "prometheus" / uid: "loki") resolve. Without these, Grafana assigns
# random UIDs and every panel renders "No data".
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    uid: loki
    type: loki
    url: http://loki:3100
    editable: false
