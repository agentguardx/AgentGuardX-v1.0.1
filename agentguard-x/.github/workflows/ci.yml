name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'agentguard-x/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'agentguard-x/**'

# Least-privilege default
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: agentguard-x

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --no-cache-dir uv==0.5.13
          uv pip install --system -r requirements-dev.txt

      - name: Run ruff (lint)
        run: ruff check .

      - name: Run black --check
        run: black --check .

      - name: Run mypy
        run: mypy agentguard/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: agentguard-x

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install uv==0.5.13
          uv pip install --system -r requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=agentguard \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303  # v5.1.2
        with:
          files: agentguard-x/coverage.xml
          flags: agentguard-x
        if: always()

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    defaults:
      run:
        working-directory: agentguard-x

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca  # v3.9.0

      - name: Build gateway image
        uses: docker/build-push-action@67a2d409c0a876cbe6b11854e3e25193efe4e62d  # v6.12.0
        with:
          context: agentguard-x
          file: agentguard-x/docker/Dockerfile.gateway
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build triage image
        uses: docker/build-push-action@67a2d409c0a876cbe6b11854e3e25193efe4e62d  # v6.12.0
        with:
          context: agentguard-x
          file: agentguard-x/docker/Dockerfile.triage
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
