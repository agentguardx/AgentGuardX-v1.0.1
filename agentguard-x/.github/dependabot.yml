version: 2

updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: /agentguard-x
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5
    reviewers:
      - agentguardx
    labels:
      - dependencies
      - python

  # Docker base images
  - package-ecosystem: docker
    directory: /agentguard-x
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /financeflow
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
